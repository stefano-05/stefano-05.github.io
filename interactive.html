<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Atari Pong Game 🕹️</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="interactive.html">Game</a>
</nav>

<main>

<section>
    <h2>Use ↑ and ↓ keys to play</h2>
    <canvas id="gameCanvas" width="600" height="400" style="background:black;"></canvas>
</section>

</main>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Ball
let x = canvas.width / 2;
let y = canvas.height / 2;
let dx = 3;
let dy = 3;
let radius = 10;

// Player paddle
let paddleY = 150;
const paddleHeight = 80;
const paddleWidth = 10;

// AI paddle
let aiY = 150;

// Score
let playerScore = 0;
let aiScore = 0;

// Draw ball
function drawBall() {
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.closePath();
}

// Draw player paddle
function drawPaddle() {
    ctx.fillStyle = "white";
    ctx.fillRect(10, paddleY, paddleWidth, paddleHeight);
}

// Draw AI paddle
function drawAIPaddle() {
    ctx.fillStyle = "white";
    ctx.fillRect(canvas.width - 20, aiY, paddleWidth, paddleHeight);
}

// Draw score
function drawScore() {
    ctx.font = "20px Arial";
    ctx.fillStyle = "white";
    ctx.fillText("You: " + playerScore, 50, 20);
    ctx.fillText("AI: " + aiScore, canvas.width - 120, 20);
}

// Controls
document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowUp") {
        paddleY -= 20;
    }
    else if (e.key === "ArrowDown") {
        paddleY += 20;
    }
});

// Reset ball
function resetBall() {
    x = canvas.width / 2;
    y = canvas.height / 2;
    dx = -dx;
}

// Game loop
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // AI movement (follows ball)
    if (aiY + paddleHeight / 2 < y) {
        aiY += 2;
    } else {
        aiY -= 2;
    }

    drawBall();
    drawPaddle();
    drawAIPaddle();
    drawScore();

    x += dx;
    y += dy;

    // Bounce top/bottom
    if (y + dy > canvas.height - radius || y + dy < radius) {
        dy = -dy;
    }

    // Player paddle collision (speed up)
    if (x - radius < 20 &&
        y > paddleY &&
        y < paddleY + paddleHeight) {
        dx = -dx * 1.1;
    }

    // AI paddle collision (speed up)
    if (x + radius > canvas.width - 20 &&
        y > aiY &&
        y < aiY + paddleHeight) {
        dx = -dx * 1.1;
    }

    // Scoring
    if (x < 0) {
        aiScore++;
        resetBall();
    }

    if (x > canvas.width) {
        playerScore++;
        resetBall();
    }

    requestAnimationFrame(draw);
}

// Start game
draw();

</script>

</body>
</html>
