<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Atari Pong Game 🕹️</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="interactive.html">Game</a>
</nav>

<main>

<section>
    <h2>Use ↑ and ↓ keys to move</h2>

    <canvas id="gameCanvas" width="600" height="400" style="background:black;"></canvas>
</section>

</main>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Ball
let x = 300;
let y = 200;
let dx = 3;
let dy = 3;
let radius = 10;

// Paddle
let paddleY = 150;
const paddleHeight = 80;
const paddleWidth = 10;

// Draw ball
function drawBall() {
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.closePath();
}

// Draw paddle
function drawPaddle() {
    ctx.fillStyle = "white";
    ctx.fillRect(10, paddleY, paddleWidth, paddleHeight);
}

// Controls
document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowUp") {
        paddleY -= 20;
    }
    else if (e.key === "ArrowDown") {
        paddleY += 20;
    }
});

// Game loop
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBall();
    drawPaddle();

    x += dx;
    y += dy;

    // Bounce off top/bottom
    if (y + dy > canvas.height - radius || y + dy < radius) {
        dy = -dy;
    }

    // Bounce off right wall
    if (x + dx > canvas.width - radius) {
        dx = -dx;
    }

    // Paddle collision
    if (x - radius < 20 &&
        y > paddleY &&
        y < paddleY + paddleHeight) {
        dx = -dx;
    }

    // Miss = reset
    if (x < 0) {
        x = 300;
        y = 200;
    }

    requestAnimationFrame(draw);
}

draw();

let score = 0;
    
</script>

</body>
</html>
