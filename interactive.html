<!DOCTYPE html>
<html>
<head>
    <title>Interactive Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Interactive Chatbot</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="interactive.html">Interactive Page</a>
</nav>

<main>

<section>
    <h2>Talk to the Bot</h2>

    <input type="text" id="userInput" placeholder="Type something..." />
    <button onclick="talk()">Send</button>

    <p id="response"></p>

    <audio id="musicPlayer"></audio>
    https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3
    
</section>

</main>

<script>

function talk() {
    let input = document.getElementById("userInput").value.toLowerCase();
    let output = "";
    let music = document.getElementByID("musicPlayer");

    if (input.includes("play music")) {
        music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
        music.play();
        output = "Playing music 🎵";
    } 
    else if (input.includes("zelda") || input.includes("song of storms")) {
        music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
        music.play();
        output = "Playing Song of Storms 🎮";
    }
    else if (input.includes("classical")) {
        music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3";
        music.play();
        output = "Playing Mozart 🎼";
    }
    else if (input.includes("jazz") || input.includes("jazz")) {
        music.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3";
        music.play();
        output = "Playing Sinatra-style jazz 🎤";
    }
    else if (input.includes("stop") || input.includes("pause")) {
        music.pause();
        output = "Music stopped.";
    }
    else {
        output = "Try typing: 'zelda', 'classical', 'jazz', or 'play music'";
    }

    document.getElementById("response").innerText = output;
}

    
    if (input.includes("hello")) {
        output = "Hi there, I am Bella's Chatbot! (type ""questions"" and you can see what I can do!)";
    } 

    else if(input.includes("questions")){
        output = "ask me - what can you do? - say something about music - or ask me to play some music!";
    ]
        
    else if (input.includes("what can you do?")) {
        output = "I am a music chatbot! Bella is developing me to play some music!";
    }
        
    else if (input.includes("music")) {
        output = "I love music too!";
    }
        
    else if (input.includes("bye")) {
        output = "Goodbye!";
    } 
    else {
        output = "I don't understand, try something else!";
    }

    
    document.getElementById("response").innerText = output;
}

</script>

</body>
</html>
